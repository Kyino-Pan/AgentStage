<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hot Sync Lab</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fcfff7;
        --ink: #223022;
        --accent: #4d7c0f;
        --line: rgba(34, 48, 34, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Segoe UI", "PingFang SC", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(132, 204, 22, 0.12), transparent 34%),
          linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
      }

      main {
        max-width: 860px;
        margin: 0 auto;
        padding: 2rem 1.2rem 3rem;
      }

      section {
        padding: 1.4rem;
        border-radius: 24px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.88);
      }

      h1 {
        margin: 0;
        font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 0.96;
      }

      p {
        line-height: 1.7;
        color: rgba(34, 48, 34, 0.82);
      }

      .pill {
        display: inline-flex;
        padding: 0.35rem 0.7rem;
        border-radius: 999px;
        background: rgba(77, 124, 15, 0.12);
        color: var(--accent);
        font-size: 0.82rem;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <div class="pill">Hot Sync</div>
        <h1>这是运行中热注册进来的页面</h1>
        <p>这个页面的作用不是展示复杂内容，而是用来验证 AgentStage 首页和用户侧栏可以在服务不重启的情况下自动感知新注册页面。</p>
      </section>
    </main>
  </body>
</html>
